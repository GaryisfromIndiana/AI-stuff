<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Empire AI</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0b0f19; color: #e2e8f0;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        .login-box {
            background: #111827; border: 1px solid #1e293b;
            border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 400px;
        }
        h1 { color: #fbbf24; font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #94a3b8; font-size: 0.85rem; margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.3rem; }
        input {
            width: 100%; padding: 0.6rem 0.8rem; background: #1a2332;
            border: 1px solid #334155; border-radius: 6px; color: #e2e8f0;
            font-size: 0.9rem; margin-bottom: 1rem;
        }
        input:focus { outline: none; border-color: #38bdf8; }
        button {
            width: 100%; padding: 0.7rem; background: #38bdf8; color: #0b0f19;
            border: none; border-radius: 6px; font-weight: 600; font-size: 0.9rem;
            cursor: pointer;
        }
        button:hover { background: #7dd3fc; }
        .error {
            background: #331111; border: 1px solid #fb7185; color: #fb7185;
            padding: 0.5rem 0.75rem; border-radius: 6px; font-size: 0.82rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>EMPIRE AI</h1>
        <p>Autonomous AI Research System</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
