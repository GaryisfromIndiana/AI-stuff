name: Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

jobs:
  quality:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      # TODO: enable once a one-shot `ruff format .` has been run and committed.
      # - name: Ruff format check
      #   run: ruff format --check .
      - name: Import boundaries
        run: lint-imports
      - name: Type check (strict islands)
        run: mypy config utils llm/schemas.py

  unit:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run unit tests
        run: python -m pytest

  integration:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run integration tests
        run: python -m pytest -m integration tests/integration -q
